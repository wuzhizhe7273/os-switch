name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Package
        run: |
          cd target/release
          tar czf os-switch-linux-x86_64.tar.gz os-switch

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: os-switch
          path: target/release/os-switch-linux-x86_64.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: os-switch/os-switch-linux-x86_64.tar.gz
          generate_release_notes: true
